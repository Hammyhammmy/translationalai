<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 260" width="470" height="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="470" height="260" fill="#ffffff"/>
  <text x="14" y="20" font-size="12" fill="#78716c">Checkpoint immunotherapy</text>

  <!-- divider -->
  <line x1="235" y1="36" x2="235" y2="248" stroke="#e7e5e4" stroke-width="1"/>

  <!-- ===================== PANEL 1: Tumour hides ===================== -->
  <text x="14" y="44" font-size="11" font-weight="600" fill="#1c1917">1. Tumour hides</text>

  <!-- Tumour cell -->
  <rect x="14" y="58" width="86" height="40" rx="9" fill="#f5f5f4" stroke="#78716c" stroke-width="1.3"/>
  <text x="57" y="76" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">Tumour</text>
  <text x="57" y="89" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">cell</text>

  <!-- PD-L1 ligand tab -->
  <rect x="100" y="68" width="34" height="20" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="117" y="81" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">PD-L1</text>

  <!-- PD-1 receptor tab -->
  <rect x="134" y="68" width="30" height="20" rx="5" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <text x="149" y="81" font-size="9" font-weight="600" fill="#0d9488" text-anchor="middle">PD-1</text>

  <!-- T cell -->
  <rect x="164" y="58" width="58" height="40" rx="9" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.6"/>
  <text x="193" y="82" font-size="11" font-weight="600" fill="#0d9488" text-anchor="middle">T cell</text>

  <!-- binding link PD-L1 : PD-1 -->
  <line x1="123" y1="93" x2="123" y2="100" stroke="#78716c" stroke-width="1"/>

  <!-- brake: red blunt-end line into T cell -->
  <path d="M149 88 L149 128 L193 128 L193 118" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- blunt end (brake bar) -->
  <line x1="186" y1="118" x2="200" y2="118" stroke="#dc2626" stroke-width="3"/>
  <text x="115" y="146" font-size="9" fill="#dc2626" text-anchor="middle">brake signal</text>

  <!-- T cell OFF -->
  <rect x="150" y="186" width="72" height="34" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.3"/>
  <text x="186" y="200" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">T cell OFF</text>
  <text x="186" y="213" font-size="9" fill="#78716c" text-anchor="middle">(braked)</text>
  <!-- arrow down to OFF -->
  <line x1="186" y1="158" x2="186" y2="184" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="186" y="172" font-size="8.5" fill="#78716c" text-anchor="middle">switched off</text>

  <!-- ===================== PANEL 2: Checkpoint inhibitor ===================== -->
  <text x="246" y="44" font-size="11" font-weight="600" fill="#1c1917">2. Checkpoint inhibitor</text>

  <!-- Tumour cell -->
  <rect x="246" y="58" width="70" height="40" rx="9" fill="#f5f5f4" stroke="#78716c" stroke-width="1.3"/>
  <text x="281" y="82" font-size="11" font-weight="600" fill="#1c1917" text-anchor="middle">Tumour</text>

  <!-- PD-L1 -->
  <rect x="316" y="68" width="32" height="20" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="332" y="81" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">PD-L1</text>

  <!-- PD-1 -->
  <rect x="376" y="68" width="28" height="20" rx="5" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <text x="390" y="81" font-size="9" font-weight="600" fill="#0d9488" text-anchor="middle">PD-1</text>

  <!-- T cell -->
  <rect x="404" y="58" width="52" height="40" rx="9" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.6"/>
  <text x="430" y="82" font-size="11" font-weight="600" fill="#0d9488" text-anchor="middle">T cell</text>

  <!-- antibody blocking the PD-1:PD-L1 bond -->
  <!-- gap between PD-L1 (x=348) and PD-1 (x=376), midpoint x=362 -->
  <line x1="348" y1="78" x2="376" y2="78" stroke="#78716c" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- antibody Y shape -->
  <g stroke="#dc2626" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M362 108 L362 96"/>
    <path d="M362 96 L356 88"/>
    <path d="M362 96 L368 88"/>
  </g>
  <!-- red cut / block ⊣ on the link -->
  <line x1="362" y1="78" x2="362" y2="88" stroke="#dc2626" stroke-width="2"/>
  <line x1="355" y1="72" x2="369" y2="84" stroke="#dc2626" stroke-width="2.4"/>
  <line x1="369" y1="72" x2="355" y2="84" stroke="#dc2626" stroke-width="2.4"/>
  <text x="362" y="124" font-size="8.5" font-weight="600" fill="#dc2626" text-anchor="middle">pembrolizumab</text>
  <text x="362" y="135" font-size="8.5" fill="#dc2626" text-anchor="middle">(anti-PD-1)</text>

  <!-- bond blocked label -->
  <text x="362" y="150" font-size="8.5" fill="#78716c" text-anchor="middle">bond blocked</text>

  <!-- T cell RELEASED -->
  <rect x="386" y="158" width="80" height="34" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="426" y="172" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">T cell ON</text>
  <text x="426" y="185" font-size="9" fill="#16a34a" text-anchor="middle">(released)</text>
  <line x1="426" y1="100" x2="426" y2="156" stroke="#16a34a" stroke-width="1.4" marker-end="url(#arrowG)"/>

  <!-- kills tumour -->
  <rect x="252" y="206" width="120" height="34" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.4"/>
  <text x="312" y="227" font-size="10.5" font-weight="600" fill="#16a34a" text-anchor="middle">kills tumour cell</text>
  <!-- arrow from released T cell to kill -->
  <path d="M426 192 L426 223 L376 223" fill="none" stroke="#16a34a" stroke-width="1.6" marker-end="url(#arrowG)"/>

  <!-- markers -->
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#78716c"/>
    </marker>
    <marker id="arrowG" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
