<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 250" width="470" height="250" font-family="-apple-system, system-ui, sans-serif">
  <rect width="470" height="250" fill="#ffffff"/>
  <text x="14" y="20" fill="#78716c" font-size="12" font-weight="600">Anti-angiogenic TKIs (RCC)</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#78716c"/>
    </marker>
  </defs>

  <!-- Row 1: VHL -> HIF -> VEGF -->
  <!-- VHL gene lost -->
  <g>
    <rect x="14" y="44" width="92" height="40" rx="9" fill="#f5f5f4" stroke="#78716c" stroke-width="1.2"/>
    <text x="60" y="61" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">VHL gene</text>
    <text x="60" y="75" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">LOST</text>
  </g>
  <line x1="106" y1="64" x2="130" y2="64" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- HIF accumulates -->
  <g>
    <rect x="132" y="44" width="100" height="40" rx="9" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.4"/>
    <text x="182" y="61" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">HIF-2&#945;</text>
    <text x="182" y="75" text-anchor="middle" fill="#78716c" font-size="10">accumulates</text>
  </g>
  <line x1="232" y1="64" x2="256" y2="64" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- VEGF -->
  <g>
    <rect x="258" y="44" width="100" height="40" rx="9" fill="#f5f5f4" stroke="#2563eb" stroke-width="1.4"/>
    <text x="308" y="61" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">VEGF</text>
    <text x="308" y="75" text-anchor="middle" fill="#78716c" font-size="10">growth signal</text>
  </g>

  <!-- belzutifan inhibition at HIF -->
  <g>
    <line x1="182" y1="108" x2="182" y2="86" stroke="#dc2626" stroke-width="1.8"/>
    <line x1="172" y1="86" x2="192" y2="86" stroke="#dc2626" stroke-width="2.4"/>
    <text x="182" y="122" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">belzutifan</text>
  </g>

  <!-- VEGF down to VEGFR (drop then arrow) -->
  <path d="M308,84 L308,108 L308,130" fill="none" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Row 2: VEGFR -> vessels -> tumour grows -->
  <!-- VEGF receptor -->
  <g>
    <rect x="258" y="132" width="100" height="42" rx="9" fill="#f5f5f4" stroke="#2563eb" stroke-width="1.4"/>
    <text x="308" y="150" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">VEGF receptor</text>
    <text x="308" y="164" text-anchor="middle" fill="#78716c" font-size="10">on vessel cells</text>
  </g>

  <!-- TKI inhibition at VEGFR (from right side) -->
  <g>
    <line x1="430" y1="153" x2="360" y2="153" stroke="#dc2626" stroke-width="1.8"/>
    <line x1="360" y1="143" x2="360" y2="163" stroke="#dc2626" stroke-width="2.4"/>
    <text x="395" y="188" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">TKIs</text>
    <text x="395" y="201" text-anchor="middle" fill="#dc2626" font-size="8.5">sunitinib,</text>
    <text x="395" y="212" text-anchor="middle" fill="#dc2626" font-size="8.5">cabozantinib,</text>
    <text x="395" y="223" text-anchor="middle" fill="#dc2626" font-size="8.5">axitinib</text>
  </g>

  <line x1="258" y1="153" x2="222" y2="153" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- New blood vessels -->
  <g>
    <rect x="120" y="132" width="100" height="42" rx="9" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.4"/>
    <text x="170" y="150" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">New vessels</text>
    <text x="170" y="164" text-anchor="middle" fill="#78716c" font-size="10">angiogenesis</text>
  </g>
  <line x1="120" y1="153" x2="92" y2="153" stroke="#78716c" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Tumour grows -->
  <g>
    <rect x="14" y="132" width="74" height="42" rx="9" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
    <text x="51" y="150" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">Tumour</text>
    <text x="51" y="164" text-anchor="middle" fill="#1c1917" font-size="11" font-weight="600">grows</text>
  </g>

  <!-- starve logic note -->
  <text x="14" y="238" fill="#78716c" font-size="10" font-style="italic">Block VEGFR &#8594; no new vessels &#8594; starve the tumour&#8217;s blood supply</text>
</svg>
