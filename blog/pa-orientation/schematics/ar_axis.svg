<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 250" width="470" height="250" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#78716c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="470" height="250" fill="#ffffff"/>

  <!-- title -->
  <text x="14" y="20" font-size="12" fill="#78716c" font-weight="600">AR-axis blockade</text>

  <!-- ============ FLOW ARROWS ============ -->
  <!-- synthesis inflow -> Testosterone -->
  <line x1="14" y1="92" x2="68" y2="92" stroke="#78716c" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="42" y="84" font-size="7.5" fill="#78716c" text-anchor="middle">synthesis</text>
  <!-- Testosterone -> DHT -->
  <line x1="162" y1="92" x2="208" y2="92" stroke="#78716c" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="185" y="85" font-size="8" fill="#78716c" text-anchor="middle">5&#945;-reductase</text>
  <!-- DHT -> AR -->
  <line x1="280" y1="92" x2="318" y2="92" stroke="#78716c" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="299" y="85" font-size="8" fill="#78716c" text-anchor="middle">binds</text>
  <!-- AR -> nucleus (down) -->
  <line x1="385" y1="114" x2="385" y2="168" stroke="#78716c" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="392" y="146" font-size="7.5" fill="#78716c">nuclear</text>
  <text x="392" y="155" font-size="7.5" fill="#78716c">entry</text>
  <!-- nucleus -> growth (left) -->
  <line x1="320" y1="192" x2="292" y2="192" stroke="#78716c" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="306" y="186" font-size="7.5" fill="#78716c" text-anchor="middle">drives</text>

  <!-- ============ BOXES ============ -->
  <!-- Testosterone -->
  <rect x="70" y="70" width="92" height="44" rx="8" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.4"/>
  <text x="116" y="96" font-size="11" fill="#1c1917" text-anchor="middle" font-weight="600">Testosterone</text>
  <!-- DHT -->
  <rect x="210" y="70" width="70" height="44" rx="8" fill="#f5f5f4" stroke="#0d9488" stroke-width="1.4"/>
  <text x="245" y="96" font-size="11" fill="#1c1917" text-anchor="middle" font-weight="600">DHT</text>
  <!-- AR -->
  <rect x="320" y="70" width="130" height="44" rx="8" fill="#f5f5f4" stroke="#2563eb" stroke-width="1.4"/>
  <text x="385" y="89" font-size="10.5" fill="#1c1917" text-anchor="middle" font-weight="600">Androgen Receptor</text>
  <text x="385" y="103" font-size="9" fill="#78716c" text-anchor="middle">(AR)</text>
  <!-- Nucleus -->
  <rect x="320" y="170" width="130" height="44" rx="8" fill="#f5f5f4" stroke="#2563eb" stroke-width="1.4"/>
  <text x="385" y="196" font-size="11" fill="#1c1917" text-anchor="middle" font-weight="600">Enters nucleus</text>
  <!-- Growth -->
  <rect x="150" y="170" width="140" height="44" rx="8" fill="#f5f5f4" stroke="#1c1917" stroke-width="1.4"/>
  <text x="220" y="189" font-size="10.5" fill="#1c1917" text-anchor="middle" font-weight="600">Prostate-cancer</text>
  <text x="220" y="202" font-size="10.5" fill="#1c1917" text-anchor="middle" font-weight="600">growth</text>

  <!-- ============ DRUG INHIBITION MARKS (red blunt-end) ============ -->
  <!-- abiraterone: blocks synthesis (CYP17), red bar before testosterone -->
  <line x1="40" y1="85" x2="40" y2="100" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>
  <text x="40" y="116" font-size="9" fill="#dc2626" text-anchor="middle" font-weight="600">abiraterone</text>
  <text x="40" y="126" font-size="7.5" fill="#dc2626" text-anchor="middle">blocks CYP17</text>

  <!-- ADT / GnRH: lowers testosterone, mark at testosterone box -->
  <line x1="116" y1="54" x2="116" y2="66" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="102" y1="66" x2="130" y2="66" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>
  <text x="116" y="46" font-size="9" fill="#dc2626" text-anchor="middle" font-weight="600">ADT / GnRH agonist&#8211;antagonist</text>

  <!-- enzalutamide: blocks AR / nuclear entry, mark at AR box -->
  <line x1="385" y1="54" x2="385" y2="66" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="371" y1="66" x2="399" y2="66" stroke="#dc2626" stroke-width="3.5" stroke-linecap="round"/>
  <text x="385" y="46" font-size="9" fill="#dc2626" text-anchor="middle" font-weight="600">enzalutamide</text>

  <!-- ============ TAKEAWAY ============ -->
  <text x="14" y="236" font-size="9" fill="#78716c" font-style="italic">Strategy: lower the hormone (ADT, abiraterone) OR block the receptor (enzalutamide).</text>
</svg>
