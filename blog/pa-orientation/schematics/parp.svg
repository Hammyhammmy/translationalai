<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 270" font-family="-apple-system, sans-serif">
  <rect width="470" height="270" fill="#ffffff"/>
  <text x="14" y="20" fill="#78716c" font-size="12">PARP inhibitors — synthetic lethality</text>

  <!-- defs: arrowheads -->
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#78716c"/>
    </marker>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- column headers -->
  <text x="150" y="42" fill="#1c1917" font-size="11" font-weight="600" text-anchor="middle">Normal cell — HR intact</text>
  <text x="350" y="42" fill="#1c1917" font-size="11" font-weight="600" text-anchor="middle">BRCA-mutant cancer — HR lost</text>

  <!-- divider -->
  <line x1="250" y1="50" x2="250" y2="258" stroke="#e7e5e4" stroke-width="1"/>

  <!-- shared DNA-break box (top, spanning) -->
  <rect x="158" y="52" width="154" height="30" rx="5" fill="#f5f5f4" stroke="#78716c" stroke-width="1"/>
  <text x="235" y="66" fill="#1c1917" font-size="10" text-anchor="middle">DNA strand breaks</text>
  <text x="235" y="78" fill="#78716c" font-size="9" text-anchor="middle">(single + double strand)</text>

  <!-- olaparib note -->
  <rect x="14" y="120" width="80" height="40" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="54" y="136" fill="#2563eb" font-size="10" font-weight="600" text-anchor="middle">olaparib</text>
  <text x="54" y="148" fill="#2563eb" font-size="8" text-anchor="middle">PARP inhibitor</text>
  <text x="54" y="157" fill="#78716c" font-size="8" text-anchor="middle">blocks backup</text>
  <line x1="94" y1="135" x2="118" y2="120" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>
  <line x1="94" y1="142" x2="305" y2="120" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ar)"/>

  <!-- ===== LEFT COLUMN (normal) ===== -->
  <!-- arrow break -> repair routes -->
  <line x1="205" y1="82" x2="150" y2="108" stroke="#78716c" stroke-width="1" marker-end="url(#ar)"/>

  <!-- PARP box (blocked) -->
  <rect x="105" y="110" width="76" height="34" rx="5" fill="#f5f5f4" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="143" y="125" fill="#1c1917" font-size="10" text-anchor="middle">PARP</text>
  <text x="143" y="137" fill="#dc2626" font-size="8" text-anchor="middle">backup — blocked</text>

  <!-- HR box (intact) -->
  <rect x="105" y="156" width="90" height="34" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.4"/>
  <text x="150" y="171" fill="#1c1917" font-size="10" text-anchor="middle">HR (BRCA)</text>
  <text x="150" y="183" fill="#16a34a" font-size="8" text-anchor="middle">main — intact</text>

  <!-- HR -> repaired -> survives -->
  <line x1="150" y1="190" x2="150" y2="212" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arG)"/>
  <rect x="98" y="214" width="104" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="150" y="230" fill="#16a34a" font-size="11" font-weight="700" text-anchor="middle">SURVIVES</text>
  <text x="150" y="244" fill="#1c1917" font-size="8" text-anchor="middle">DNA repaired via HR</text>

  <!-- ===== RIGHT COLUMN (cancer) ===== -->
  <line x1="265" y1="82" x2="350" y2="108" stroke="#78716c" stroke-width="1" marker-end="url(#ar)"/>

  <!-- PARP box (blocked) -->
  <rect x="305" y="110" width="76" height="34" rx="5" fill="#f5f5f4" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="343" y="125" fill="#1c1917" font-size="10" text-anchor="middle">PARP</text>
  <text x="343" y="137" fill="#dc2626" font-size="8" text-anchor="middle">backup — blocked</text>

  <!-- HR box (lost) -->
  <rect x="305" y="156" width="90" height="34" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="350" y="171" fill="#1c1917" font-size="10" text-anchor="middle">HR (BRCA)</text>
  <text x="350" y="183" fill="#dc2626" font-size="8" text-anchor="middle">main — mutated/lost</text>

  <!-- both gone -> cell death -->
  <line x1="350" y1="190" x2="350" y2="212" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arR)"/>
  <rect x="298" y="214" width="104" height="38" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6"/>
  <text x="350" y="230" fill="#dc2626" font-size="11" font-weight="700" text-anchor="middle">CELL DEATH</text>
  <text x="350" y="244" fill="#1c1917" font-size="8" text-anchor="middle">DNA unrepaired — both gone</text>

  <!-- teaching point footer -->
  <text x="14" y="266" fill="#78716c" font-size="8.5">Blocking the backup (PARP) is lethal only when the main repair (HR/BRCA) is already broken — spares normal cells, kills the tumour.</text>
</svg>
