<svg viewBox="0 0 580 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, sans-serif">
  <!-- ============ DEFS ============ -->
  <defs>
    <marker id="chev" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#0d9488"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowInk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9 Z" fill="#1c1917"/>
    </marker>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="580" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="20" y="26" font-size="12" fill="#78716c" letter-spacing="0.5">Schematic — complete model</text>

  <!-- ============ BACK-PRESSURE TINT (drawn first, behind ureters) ============ -->
  <!-- faint amber wash up the ureters toward kidneys -->
  <path d="M 220,210 C 235,300 250,360 268,415" fill="none" stroke="#d97706" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
  <path d="M 350,210 C 335,300 320,360 302,415" fill="none" stroke="#d97706" stroke-width="14" stroke-linecap="round" opacity="0.12"/>

  <!-- ============ URETERS ============ -->
  <path d="M 220,210 C 235,300 250,360 268,415" fill="none" stroke="#d97706" stroke-width="6" stroke-linecap="round"/>
  <path d="M 350,210 C 335,300 320,360 302,415" fill="none" stroke="#d97706" stroke-width="6" stroke-linecap="round"/>

  <!-- ============ KIDNEYS ============ -->
  <!-- Left kidney -->
  <g transform="translate(200,170)">
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 40,-5 30,-2 24,0 C 30,2 40,5 40,10 C 40,35 25,55 0,55 C -25,55 -42,35 -42,0 C -42,-35 -25,-55 0,-55 Z"
          fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <!-- inner pelvis hint -->
    <path d="M 22,-2 C 8,-2 -4,4 -10,14" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  </g>
  <!-- Right kidney (mirror) -->
  <g transform="translate(370,170) scale(-1,1)">
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 40,-5 30,-2 24,0 C 30,2 40,5 40,10 C 40,35 25,55 0,55 C -25,55 -42,35 -42,0 C -42,-35 -25,-55 0,-55 Z"
          fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <path d="M 22,-2 C 8,-2 -4,4 -10,14" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- ============ BLADDER (slightly distended) ============ -->
  <path d="M 210,415
           C 210,398 250,392 285,392
           C 320,392 360,398 360,415
           C 366,440 366,478 350,505
           C 335,528 305,536 285,536
           C 265,536 235,528 220,505
           C 204,478 204,440 210,415 Z"
        fill="#f97316" stroke="#ea580c" stroke-width="2"/>
  <!-- ureter entry openings -->
  <circle cx="268" cy="415" r="3" fill="#ea580c"/>
  <circle cx="302" cy="415" r="3" fill="#ea580c"/>

  <!-- ============ PROSTATE RING ============ -->
  <g transform="translate(285,535)">
    <circle cx="0" cy="0" r="20" fill="#9a3412"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>

  <!-- ============ URETHRA ============ -->
  <path d="M 285,555 L 285,652" fill="none" stroke="#7c3aed" stroke-width="9" stroke-linecap="round"/>

  <!-- ============ FLOW CHEVRONS (kidney -> exit) ============ -->
  <!-- ureters -->
  <path d="M 226,250 L 240,310" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <path d="M 248,345 L 261,395" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <path d="M 344,250 L 330,310" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <path d="M 322,345 L 309,395" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <!-- through bladder -->
  <path d="M 285,420 L 285,455" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <path d="M 285,475 L 285,508" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <!-- urethra -->
  <path d="M 285,562 L 285,582" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>
  <path d="M 285,635 L 285,655" fill="none" stroke="#f97316" stroke-width="0" marker-end="url(#chev)"/>

  <!-- ============ STONE (urethral obstruction) ============ -->
  <g transform="translate(285,600)">
    <path d="M -8,-5 C -10,-9 -3,-11 2,-9 C 8,-10 11,-3 9,2 C 11,6 5,11 0,9 C -6,11 -11,4 -8,-5 Z"
          fill="#57534e" stroke="#44403c" stroke-width="1.5"/>
    <path d="M -3,-3 L 1,-1 L -1,3" fill="none" stroke="#a8a29e" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ============ SYMPATHETIC NERVE (teal, left) ============ -->
  <path d="M 120,120 C 140,250 150,400 250,520"
        fill="none" stroke="#0d9488" stroke-width="2.5" stroke-dasharray="1 7" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <circle cx="120" cy="120" r="4" fill="#0d9488"/>
  <!-- ganglion beads -->
  <circle cx="130" cy="200" r="3.5" fill="#0d9488"/>
  <circle cx="139" cy="290" r="3.5" fill="#0d9488"/>
  <circle cx="150" cy="380" r="3.5" fill="#0d9488"/>

  <!-- ============ PARASYMPATHETIC NERVE (violet, lower right) ============ -->
  <path d="M 430,660 C 400,600 360,520 320,470"
        fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="1 7" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <circle cx="430" cy="660" r="4" fill="#7c3aed"/>

  <!-- ============ NEPHRON INSET (top-left) ============ -->
  <g transform="translate(20,55)">
    <rect x="0" y="0" width="160" height="150" rx="10" fill="#ffffff" stroke="#e7e5e4" stroke-width="1.5"/>
    <text x="12" y="20" font-size="10.5" font-weight="600" fill="#1c1917">How urine is produced</text>

    <!-- glomerular tuft -->
    <g transform="translate(46,72)">
      <circle cx="0" cy="0" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
      <path d="M -8,-6 C -2,-12 4,-10 6,-4 C 10,-8 12,0 6,3 C 10,8 2,12 -2,7 C -8,12 -12,3 -8,-6 Z"
            fill="none" stroke="#16a34a" stroke-width="1.5"/>
    </g>
    <text x="46" y="104" font-size="8" fill="#78716c" text-anchor="middle">glomerulus</text>

    <!-- tubule loop -->
    <path d="M 64,66 C 92,60 96,82 104,82 C 116,82 116,108 104,108 C 94,108 96,128 110,128"
          fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
    <text x="118" y="60" font-size="8" fill="#78716c" text-anchor="middle">tubule</text>

    <!-- filtrate -> urine arrow -->
    <path d="M 64,72 L 88,72" fill="none" stroke="#1c1917" stroke-width="1.3" marker-end="url(#arrowInk)"/>
    <text x="80" y="142" font-size="8.5" fill="#1c1917" text-anchor="middle">filtrate → urine</text>
  </g>
  <!-- dotted leader from inset to left kidney -->
  <path d="M 180,150 C 195,150 198,158 200,164" fill="none" stroke="#a8a29e" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- ============ LABELS with leader lines ============ -->
  <!-- Kidney -->
  <line x1="412" y1="150" x2="445" y2="138" stroke="#a8a29e" stroke-width="1"/>
  <text x="449" y="142" font-size="11" font-weight="600" fill="#1c1917">Kidney</text>

  <!-- Ureter -->
  <line x1="318" y1="320" x2="360" y2="320" stroke="#a8a29e" stroke-width="1"/>
  <text x="364" y="324" font-size="11" font-weight="600" fill="#1c1917">Ureter</text>

  <!-- Bladder -->
  <line x1="362" y1="450" x2="410" y2="450" stroke="#a8a29e" stroke-width="1"/>
  <text x="414" y="454" font-size="11" font-weight="600" fill="#1c1917">Bladder</text>

  <!-- Prostate -->
  <line x1="307" y1="535" x2="395" y2="535" stroke="#a8a29e" stroke-width="1"/>
  <text x="399" y="539" font-size="11" font-weight="600" fill="#1c1917">Prostate</text>

  <!-- Urethra -->
  <line x1="292" y1="640" x2="360" y2="660" stroke="#a8a29e" stroke-width="1"/>
  <text x="364" y="664" font-size="11" font-weight="600" fill="#1c1917">Urethra</text>

  <!-- ============ INNERVATION EDGE LABELS ============ -->
  <!-- Sympathetic (left edge) -->
  <rect x="20" y="232" width="150" height="34" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text x="30" y="248" font-size="9.5" font-weight="700" fill="#0d9488">Sympathetic · T10–L2</text>
  <text x="30" y="260" font-size="9" fill="#0f766e">STORAGE</text>
  <line x1="145" y1="290" x2="143" y2="266" stroke="#0d9488" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Parasympathetic (right edge) -->
  <rect x="410" y="592" width="158" height="34" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="420" y="608" font-size="9.5" font-weight="700" fill="#7c3aed">Parasympathetic · S2–S4</text>
  <text x="420" y="620" font-size="9" fill="#6d28d9">VOIDING</text>
  <line x1="430" y1="655" x2="430" y2="626" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- ============ PATHOLOGY CALLOUT BOX ============ -->
  <rect x="380" y="700" width="0" height="0" fill="none"/>
  <g transform="translate(330,580)">
    <rect x="0" y="0" width="178" height="20" rx="4" fill="#fafaf9" stroke="#57534e" stroke-width="1"/>
    <circle cx="11" cy="10" r="4" fill="#57534e"/>
    <text x="22" y="14" font-size="9.5" font-weight="600" fill="#1c1917">Stone — urethral obstruction</text>
  </g>
  <line x1="330" y1="595" x2="296" y2="600" stroke="#57534e" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- back-pressure note -->
  <text x="190" y="285" font-size="9" font-style="italic" fill="#b45309">back-pressure ↑</text>
  <line x1="225" y1="290" x2="240" y2="305" stroke="#d97706" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>
</svg>
