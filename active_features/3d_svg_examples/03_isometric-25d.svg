<svg viewBox="0 0 440 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Kidney volume gradient: lit top-left, shadowed lower-right -->
    <linearGradient id="kidGrad" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#34d27a"/>
      <stop offset="0.45" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0e6b32"/>
    </linearGradient>
    <!-- Bladder volume gradient -->
    <radialGradient id="bladGrad" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#ffb066"/>
      <stop offset="0.5" stop-color="#f97316"/>
      <stop offset="1" stop-color="#b8480a"/>
    </radialGradient>
    <!-- Ureter tube gradient (amber) -->
    <linearGradient id="ureGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf5e"/>
      <stop offset="0.5" stop-color="#d97706"/>
      <stop offset="1" stop-color="#9a5208"/>
    </linearGradient>
    <!-- Urethra tube gradient (purple) -->
    <linearGradient id="urethGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a87bf0"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Soft drop shadow blur -->
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="440" height="560" fill="#ffffff"/>

  <!-- Style title -->
  <text x="16" y="26" font-family="-apple-system, sans-serif" font-size="13" fill="#78716c">Isometric 2.5D</text>

  <!-- ===================== DROP SHADOWS (ground plane) ===================== -->
  <ellipse cx="124" cy="172" rx="46" ry="13" fill="#1c1917" opacity="0.13" filter="url(#soft)"/>
  <ellipse cx="324" cy="172" rx="46" ry="13" fill="#1c1917" opacity="0.13" filter="url(#soft)"/>
  <ellipse cx="222" cy="470" rx="80" ry="20" fill="#1c1917" opacity="0.14" filter="url(#soft)"/>

  <!-- ===================== URETERS (tubes, drawn under organs) ===================== -->
  <!-- Left ureter: hilum (150,115) -> bladder (188,345) -->
  <g>
    <path d="M 150,118 C 176,170 150,250 158,300 C 162,326 178,338 188,348"
          fill="none" stroke="url(#ureGrad)" stroke-width="13" stroke-linecap="round"/>
    <path d="M 150,118 C 176,170 150,250 158,300 C 162,326 178,338 188,348"
          fill="none" stroke="#fcd9a0" stroke-width="3.5" stroke-linecap="round" opacity="0.85"
          transform="translate(-3,-1)"/>
  </g>
  <!-- Right ureter: hilum (290,115) -> bladder (252,345) -->
  <g>
    <path d="M 290,118 C 266,170 292,250 284,300 C 280,326 264,338 252,348"
          fill="none" stroke="url(#ureGrad)" stroke-width="13" stroke-linecap="round"/>
    <path d="M 290,118 C 266,170 292,250 284,300 C 280,326 264,338 252,348"
          fill="none" stroke="#fcd9a0" stroke-width="3.5" stroke-linecap="round" opacity="0.85"
          transform="translate(-3,-1)"/>
  </g>

  <!-- ===================== URETHRA (tube exiting bladder) ===================== -->
  <g>
    <path d="M 220,452 L 220,515" fill="none" stroke="url(#urethGrad)" stroke-width="15" stroke-linecap="round"/>
    <path d="M 216,452 L 216,512" fill="none" stroke="#c4a3f5" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- ===================== LEFT KIDNEY (hilum faces center/right) ===================== -->
  <g transform="translate(120,110)">
    <!-- base body -->
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 40,-5 30,-2 24,0 C 30,2 40,5 40,10 C 40,35 25,55 0,55 C -25,55 -42,35 -42,0 C -42,-35 -25,-55 0,-55 Z"
          fill="url(#kidGrad)" stroke="#0e6b32" stroke-width="1.5"/>
    <!-- lower shadow crescent (darker shade) -->
    <path d="M -42,0 C -42,35 -25,55 0,55 C 25,55 40,35 40,10 C 40,5 30,2 24,0 C 18,8 6,14 -8,14 C -26,14 -38,7 -42,0 Z"
          fill="#0e6b32" opacity="0.40"/>
    <!-- top-left highlight -->
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 30,-30 14,-44 -4,-44 C -22,-44 -34,-34 -40,-18 C -38,-38 -22,-55 0,-55 Z"
          fill="#bdf2cf" opacity="0.55"/>
  </g>

  <!-- ===================== RIGHT KIDNEY (mirrored, hilum faces center/left) ===================== -->
  <g transform="translate(320,110) scale(-1,1)">
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 40,-5 30,-2 24,0 C 30,2 40,5 40,10 C 40,35 25,55 0,55 C -25,55 -42,35 -42,0 C -42,-35 -25,-55 0,-55 Z"
          fill="url(#kidGrad)" stroke="#0e6b32" stroke-width="1.5"/>
    <path d="M -42,0 C -42,35 -25,55 0,55 C 25,55 40,35 40,10 C 40,5 30,2 24,0 C 18,8 6,14 -8,14 C -26,14 -38,7 -42,0 Z"
          fill="#0e6b32" opacity="0.40"/>
    <path d="M 0,-55 C 25,-55 40,-35 40,-10 C 30,-30 14,-44 -4,-44 C -22,-44 -34,-34 -40,-18 C -38,-38 -22,-55 0,-55 Z"
          fill="#bdf2cf" opacity="0.55"/>
  </g>

  <!-- ===================== BLADDER (volume orange, ~150w x 120t @ 220,395) ===================== -->
  <g>
    <!-- main body -->
    <path d="M 220,335
             C 268,335 295,360 295,398
             C 295,432 272,456 245,460
             C 240,468 230,470 220,470
             C 210,470 200,468 195,460
             C 168,456 145,432 145,398
             C 145,360 172,335 220,335 Z"
          fill="url(#bladGrad)" stroke="#b8480a" stroke-width="1.6"/>
    <!-- lower shadow -->
    <path d="M 152,420 C 162,448 188,460 220,460 C 252,460 278,448 288,420
             C 280,444 254,456 220,456 C 186,456 160,444 152,420 Z"
          fill="#8a3608" opacity="0.45"/>
    <!-- top-left highlight -->
    <ellipse cx="192" cy="368" rx="34" ry="20" fill="#ffd9ad" opacity="0.55"/>
  </g>

  <!-- ===================== LABELS ===================== -->
  <g font-family="-apple-system, sans-serif" font-size="13" fill="#1c1917">
    <!-- Kidney (left) -->
    <line x1="120" y1="74" x2="120" y2="50" stroke="#78716c" stroke-width="1"/>
    <text x="120" y="44" text-anchor="middle">Kidney</text>
    <!-- Kidney (right) -->
    <line x1="320" y1="74" x2="320" y2="50" stroke="#78716c" stroke-width="1"/>
    <text x="320" y="44" text-anchor="middle">Kidney</text>
    <!-- Ureter (point at right ureter) -->
    <line x1="286" y1="250" x2="350" y2="250" stroke="#78716c" stroke-width="1"/>
    <text x="356" y="254">Ureter</text>
    <!-- Bladder -->
    <line x1="295" y1="398" x2="358" y2="398" stroke="#78716c" stroke-width="1"/>
    <text x="362" y="402">Bladder</text>
    <!-- Urethra -->
    <line x1="228" y1="500" x2="290" y2="500" stroke="#78716c" stroke-width="1"/>
    <text x="296" y="504">Urethra</text>
  </g>
</svg>
