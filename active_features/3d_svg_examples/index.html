<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urinary anatomy — style mockups</title>
<style>
  :root { --bg:#fafaf9; --card:#fff; --border:#e7e5e4; --text:#1c1917; --muted:#78716c; --mono:"SF Mono","Fira Code",Consolas,monospace; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:40px 24px 80px; }
  .wrap { max-width:1180px; margin:0 auto; }
  h1 { font-size:26px; font-weight:800; letter-spacing:-0.02em; margin-bottom:6px; }
  .sub { color:var(--muted); font-size:15px; margin-bottom:32px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .cell { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
  .cell .frame { height:360px; display:flex; align-items:center; justify-content:center; padding:14px; background:#fff; }
  .cell img { max-width:100%; max-height:100%; }
  .cap { border-top:1px solid var(--border); padding:12px 16px; }
  .cap .name { font-weight:700; font-size:14px; }
  .cap .num { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
  @media (max-width:900px){ .grid{ grid-template-columns:1fr 1fr; } }
  @media (max-width:600px){ .grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Urinary anatomy — six style mockups</h1>
  <p class="sub">Same anatomy, six visual languages. Pick the one you'd want to read.</p>
  <div class="grid">
    <div class="cell"><div class="frame"><img src="01_anatomical-lineart.svg" alt="anatomical line-art"></div><div class="cap"><div class="num">01</div><div class="name">Anatomical line-art</div></div></div>
    <div class="cell"><div class="frame"><img src="02_flat-editorial.svg" alt="flat editorial vector"></div><div class="cap"><div class="num">02</div><div class="name">Flat editorial vector</div></div></div>
    <div class="cell"><div class="frame"><img src="03_isometric-25d.svg" alt="isometric 2.5D"></div><div class="cap"><div class="num">03</div><div class="name">Isometric 2.5D</div></div></div>
    <div class="cell"><div class="frame"><img src="04_cross-section.svg" alt="cross-section cutaway"></div><div class="cap"><div class="num">04</div><div class="name">Cross-section cutaway</div></div></div>
    <div class="cell"><div class="frame"><img src="05_schematic-conduit.svg" alt="schematic conduit"></div><div class="cap"><div class="num">05</div><div class="name">Schematic conduit</div></div></div>
    <div class="cell"><div class="frame"><img src="06_atlas-engraving.svg" alt="atlas engraving"></div><div class="cap"><div class="num">06</div><div class="name">Atlas engraving</div></div></div>
  </div>
</div>
</body>
</html>
