<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChartPrepper — Urology Demo Cases</title>
<meta name="description" content="Sample urology cases processed by ChartPrepper. Synthetic patients, no real PHI.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1f33;--ink-soft:#2a4258;--ink-mute:#5b7184;--ink-faint:#98a7b6;
    --line:#e2e8ee;--line-soft:#eef2f6;--paper:#fff;--paper-warm:#f7f9fb;--paper-cool:#f1f5f9;
    --accent:#00876f;--accent-deep:#005f4f;--accent-tint:#e6f4f0;--signal:#c84a2e;--signal-tint:#fbeae5;
    --font-sans:'IBM Plex Sans',system-ui,sans-serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--font-sans);color:var(--ink);background:var(--paper-warm);display:flex;flex-direction:column;height:100vh;overflow:hidden}

  header{background:var(--paper);border-bottom:1px solid var(--line);padding:14px 22px;flex-shrink:0}
  .htop{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .brand b{color:var(--accent-deep)}
  .sub{font-size:13px;color:var(--ink-mute)}
  .synth{font-family:var(--font-mono);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
    color:var(--accent-deep);background:var(--accent-tint);border:1px solid #bfe3da;border-radius:999px;padding:3px 9px;margin-left:auto}
  .back{font-size:12.5px;color:var(--ink-mute);text-decoration:none;border-bottom:1px dotted var(--ink-faint)}
  .back:hover{color:var(--accent-deep)}

  .app{display:grid;grid-template-columns:340px minmax(0,1fr);flex:1;min-height:0}

  /* case list */
  .list{background:var(--paper);border-right:1px solid var(--line);overflow-y:auto;padding:10px}
  .lcount{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);padding:6px 8px 8px}
  .case{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid transparent;background:none;
    border-radius:9px;padding:9px 10px;cursor:pointer;color:var(--ink);text-decoration:none;margin-bottom:2px}
  .case:hover{background:var(--paper-cool)}
  .case.active{background:var(--accent-tint);border-color:#bfe3da}
  .num{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--accent-deep);background:var(--paper-cool);
    border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .case.active .num{background:#fff}
  .meta{min-width:0;flex:1}
  .name{font-size:14px;font-weight:600;line-height:1.25}
  .cond{font-size:12px;color:var(--ink-mute);line-height:1.3}
  .pop{flex-shrink:0;color:var(--ink-faint);border:none;background:none;cursor:pointer;padding:4px;border-radius:6px;line-height:0}
  .pop:hover{color:var(--accent-deep);background:#fff}

  /* viewer */
  .viewer{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--paper-cool)}
  .vbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--paper);border-bottom:1px solid var(--line);flex-shrink:0}
  .vtitle{font-size:13.5px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .vtitle span{color:var(--ink-mute);font-weight:400}
  .vacts{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
  .vbtn{font-family:var(--font-sans);font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--paper);
    border:1px solid var(--line);border-radius:7px;padding:6px 11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .vbtn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .vbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .vbtn.primary:hover{background:var(--accent-deep);color:#fff}
  iframe{border:none;flex:1;width:100%;background:var(--paper-cool)}

  /* mobile: no reliable embedded PDF — cases open in a new tab, list goes full width */
  .mobile-note{display:none}
  @media(max-width:820px){
    body{height:auto;overflow:auto}
    .app{grid-template-columns:1fr}
    .list{border-right:none;border-bottom:1px solid var(--line)}
    .viewer{display:none}
    .mobile-note{display:block;font-size:12px;color:var(--ink-mute);padding:6px 8px 10px}
    .pop{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="htop">
    <span class="brand">ChartPrepper — <b>Urology Demo Cases</b></span>
    <span class="sub">Sample charts processed by ChartPrepper. Click a case to read it.</span>
    <span class="synth">Synthetic · no real PHI</span>
  </div>
  <a class="back" href="/">← translational.ca</a>
</header>

<div class="app">
  <nav class="list" id="list" aria-label="Demo cases">
    <div class="lcount" id="count"></div>
    <div class="mobile-note">Tap a case to open the PDF in a new tab.</div>
  </nav>
  <section class="viewer">
    <div class="vbar">
      <div class="vtitle" id="vtitle"></div>
      <div class="vacts">
        <a class="vbtn primary" id="vopen" href="#" target="_blank" rel="noopener">Open ↗</a>
        <a class="vbtn" id="vdl" href="#" download>Download</a>
      </div>
    </div>
    <iframe id="frame" title="Case PDF" src="about:blank"></iframe>
  </section>
</div>

<script>
  const CASES=[
    {f:'01_HARRISON_Walter_hematuria.pdf',      name:'Walter Harrison',   cond:'Gross hematuria'},
    {f:'02_DACOSTA_Manuel_elevated_PSA.pdf',    name:'Manuel Da Costa',   cond:'Elevated PSA'},
    {f:'03_NWOSU_Grace_recurrent_UTI.pdf',      name:'Grace Nwosu',       cond:'Recurrent UTI'},
    {f:'04_FONTAINE_Real_BPH_LUTS.pdf',         name:'Réal Fontaine',     cond:'BPH / LUTS'},
    {f:'05_ODUYA_Blessing_micro_hematuria.pdf', name:'Blessing Oduya',    cond:'Microscopic hematuria'},
    {f:'06_KOWALCZYK_Piotr_renal_colic.pdf',    name:'Piotr Kowalczyk',   cond:'Renal colic'},
    {f:'07_BELANGER_Denis_erectile_dysfunction.pdf', name:'Denis Bélanger', cond:'Erectile dysfunction'},
    {f:'08_ROTHSTEIN_Aaron_peyronies.pdf',      name:'Aaron Rothstein',   cond:'Peyronie’s disease'},
    {f:'09_WHITFIELD_Carol_urge_incontinence.pdf', name:'Carol Whitfield', cond:'Urge incontinence'},
    {f:'10_ALRASHID_Samir_chronic_prostatitis.pdf', name:'Samir Al-Rashid', cond:'Chronic prostatitis'},
    {f:'11_TREMBLAY_Etienne_testicular_mass.pdf', name:'Étienne Tremblay', cond:'Testicular mass'},
    {f:'12_IBRAHIM_Yusuf_varicocele.pdf',       name:'Yusuf Ibrahim',     cond:'Varicocele'},
    {f:'13_MACPHERSON_Ian_obstructive_uropathy.pdf', name:'Ian MacPherson', cond:'Obstructive uropathy'},
    {f:'14_SANTOS_Rafael_male_infertility.pdf', name:'Rafael Santos',     cond:'Male infertility'},
    {f:'15_LUND_Gregory_recurrent_stones.pdf',  name:'Gregory Lund',      cond:'Recurrent stones'},
  ];
  const list=document.getElementById('list'), frame=document.getElementById('frame');
  const vtitle=document.getElementById('vtitle'), vopen=document.getElementById('vopen'), vdl=document.getElementById('vdl');
  const count=document.getElementById('count');
  const isMobile=()=>window.matchMedia('(max-width:820px)').matches;
  count.textContent=CASES.length+' cases';

  const rows=[];
  CASES.forEach((c,i)=>{
    const a=document.createElement('a');
    a.className='case'; a.href=c.f;
    a.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span>`+
      `<span class="meta"><span class="name">${c.name}</span><span class="cond">${c.cond}</span></span>`+
      `<span class="pop" title="Open in new tab" aria-label="Open in new tab"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 3H3v9h9V9.5M9 3h3v3M12 3L7 8"/></svg></span>`;
    a.addEventListener('click',(e)=>{
      // the little ↗ always opens a new tab; so does any tap on mobile
      const pop=e.target.closest('.pop');
      if(isMobile()){ return; }            // let the native link open the PDF (new tab via target below)
      if(pop){ window.open(c.f,'_blank','noopener'); e.preventDefault(); return; }
      e.preventDefault(); select(i);
    });
    if(isMobile()){ a.target='_blank'; a.rel='noopener'; }
    list.appendChild(a); rows.push(a);
  });

  function select(i){
    const c=CASES[i];
    rows.forEach((r,j)=>r.classList.toggle('active',j===i));
    frame.src=c.f+'#view=FitH';
    vtitle.innerHTML=`${c.name} <span>· ${c.cond}</span>`;
    vopen.href=c.f; vdl.href=c.f;
  }

  // keyboard: ↑/↓ to move through cases (desktop)
  document.addEventListener('keydown',(e)=>{
    if(isMobile()) return;
    const cur=rows.findIndex(r=>r.classList.contains('active'));
    if(e.key==='ArrowDown'){e.preventDefault();select(Math.min((cur<0?0:cur+1),CASES.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();select(Math.max((cur<0?0:cur-1),0));}
  });

  if(!isMobile()) select(0);   // preload the first case in the frame on desktop
</script>
</body>
</html>
